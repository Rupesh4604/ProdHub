<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="google-site-verification" content="RiaPPGKXLWbj1Lved-L9aWfcbrsFukyfrlYgAEN33jI" />
    <meta
      name="description"
      content="ProdHub – Your all-in-one productivity hub. Manage tasks, habits, goals, and projects in one beautiful place."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>ProdHub - Productivity Hub</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1117;
        color: #e2e8f0;
      }
      /* Loading screen — hidden once React mounts */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f1117;
        gap: 1.5rem;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 1.5rem;
        font-weight: 700;
        color: #60a5fa;
        letter-spacing: -0.4px;
      }
      #splash .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #1e293b;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      #splash .tagline {
        font-size: 0.85rem;
        color: #475569;
        letter-spacing: 0.02em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Branded splash shown while React boots -->
    <div id="splash">
      <div class="brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        ProdHub
      </div>
      <div class="spinner"></div>
      <p class="tagline">Your productivity hub is loading…</p>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash once React renders
      document.addEventListener('DOMContentLoaded', function () {
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) {
            var splash = document.getElementById('splash');
            if (splash) {
              splash.style.opacity = '0';
              setTimeout(function () { splash.remove(); }, 350);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
</html>
